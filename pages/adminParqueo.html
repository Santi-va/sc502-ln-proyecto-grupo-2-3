<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Parqueo | Parkéate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="admin.html">Parkéate</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
                <li class="nav-item"><a class="nav-link" href="adminParqueo.html">Parqueo</a></li>
                <li class="nav-item"><a class="nav-link" href="reportes.html">Reportes</a></li>
                <li class="nav-item"><a class="nav-link" href="ayuda.html">Ayuda</a></li>
            </ul>
        </div>
    </div>
</nav>
<section class="hero hero-admin"><div class="container"><h1>Administración de parqueo</h1><p>Registra, consulta y filtra los espacios disponibles del sistema.</p></div></section>
<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card-panel">
                <h2 class="section-title">Agregar espacio</h2>
                <form id="formParqueo">
                    <div class="mb-3"><label class="form-label">Zona</label><input id="zonaParqueo" class="form-control" placeholder="Ejemplo: A"></div>
                    <div class="mb-3"><label class="form-label">Número de espacio</label><input id="numeroParqueo" class="form-control" placeholder="Ejemplo: A-03"></div>
                    <div class="mb-3"><label class="form-label">Tarifa por hora</label><input id="tarifaParqueo" type="number" class="form-control" placeholder="1200"></div>
                    <button class="btn btn-primary w-100" type="submit">Guardar espacio</button>
                </form>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card-panel table-responsive">
                <div class="d-flex justify-content-between align-items-center gap-3 flex-wrap mb-3">
                    <h2 class="section-title mb-0">Espacios registrados</h2>
                    <select id="filtroParqueo" class="form-select filtro-parqueo">
                        <option>Todos</option><option>Disponible</option><option>Ocupado</option><option>Reservado</option><option>Mantenimiento</option>
                    </select>
                </div>
                <table class="table table-hover align-middle">
                    <thead><tr><th>Zona</th><th>Espacio</th><th>Estado</th><th>Placa</th><th>Tarifa</th></tr></thead>
                    <tbody id="tablaParqueosAdmin"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
