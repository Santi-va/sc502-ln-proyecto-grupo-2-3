<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Administración de Parqueo | Parkéate</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"><link rel="stylesheet" href="../css/style.css"></head><body><nav class="navbar navbar-expand-lg sticky-top"><div class="container"><a class="navbar-brand" href="admin.html">Parkéate</a><button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="menuPrincipal"><ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li><li class="nav-item"><a class="nav-link active" href="adminParqueo.html">Parqueo</a></li><li class="nav-item"><a class="nav-link" href="ayuda.html">Ayuda</a></li></ul></div></div></nav><section class="hero-buscar"><div class="container"><h1>Administración de parqueo</h1><p>Registra, consulta y filtra los espacios disponibles del sistema.</p></div></section><main class="container seccion"><div class="row g-4 mb-4"><div class="col-md-3"><div class="card-beneficio"><span>Total espacios</span><strong id="estadisticaTotalEspacios" class="contador d-block">0</strong></div></div><div class="col-md-3"><div class="card-beneficio"><span>Disponibles</span><strong id="estadisticaDisponibles" class="contador d-block">0</strong></div></div><div class="col-md-3"><div class="card-beneficio"><span>Ocupados</span><strong id="estadisticaOcupados" class="contador d-block">0</strong></div></div><div class="col-md-3"><div class="card-beneficio"><span>Reservados</span><strong id="estadisticaReservados" class="contador d-block">0</strong></div></div></div><div class="row g-4"><div class="col-lg-4"><div class="card"
